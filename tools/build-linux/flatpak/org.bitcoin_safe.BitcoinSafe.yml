app-id: org.bitcoin_safe.BitcoinSafe
branch: stable
runtime: org.kde.Platform
runtime-version: "6.9"
sdk: org.kde.Sdk
command: run-bitcoin-safe.sh
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=all
  - --filesystem=home
modules:
  - name: libusb
    buildsystem: autotools
    config-opts:
      - --disable-static
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/doc
      - /share/man
    sources:
      - type: git
        url: https://github.com/libusb/libusb.git
        tag: v1.0.26

  - name: hidapi
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DHIDAPI_WITH_HIDRAW=ON
      - -DHIDAPI_WITH_LIBUSB=ON
      - -DHIDAPI_BUILD_HIDTEST=OFF
      - -DHIDAPI_BUILD_TESTGUI=OFF
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/doc
      - /share/man
    sources:
      - type: git
        url: https://github.com/libusb/hidapi.git
        tag: hidapi-0.15.0

  - name: zbar
    buildsystem: simple
    build-commands:
      - autoreconf -vfi
      - >-
        ./configure
        --prefix=/app
        --enable-pthread=no
        --enable-doc=no
        --with-python=no
        --with-gtk=no
        --with-qt=no
        --with-java=no
        --with-imagemagick=no
        --with-dbus=no
        --with-x=no
        --enable-video=no
        --with-jpeg=no
        --enable-codes=qrcode
        --disable-static
        --enable-shared
      - make -j${FLATPAK_BUILDER_N_JOBS}
      - make install
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/doc
      - /share/man
    sources:
      - type: git
        url: https://github.com/mchehab/zbar.git
        tag: 0.23.93

  - name: bitcoin-safe
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - |
        set -eux
        PYVER="$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
        BUILD_VENV_ROOT="${PWD}/.venv"
        python3 -m ensurepip --upgrade
        python3 -m venv "${BUILD_VENV_ROOT}"
        export VIRTUAL_ENV="${BUILD_VENV_ROOT}"
        export PATH="${BUILD_VENV_ROOT}/bin:${PATH}"
        python3 -m pip install --upgrade pip poetry
        poetry install --only main --no-interaction --no-root
        mkdir -p "/app/lib/python${PYVER}/site-packages" /app/bin
        cp -a "${BUILD_VENV_ROOT}/lib/python${PYVER}/site-packages/." "/app/lib/python${PYVER}/site-packages/"
        cp -a bitcoin_safe "/app/lib/python${PYVER}/site-packages/bitcoin_safe"
        for executable in "${BUILD_VENV_ROOT}"/bin/*; do
            executable_name="$(basename "${executable}")"
            case "${executable_name}" in
                python|python3|"python${PYVER}"|activate|activate.*)
                    continue
                    ;;
            esac
            install -Dm755 "${executable}" "/app/bin/${executable_name}"
        done
        install -Dm755 tools/build-linux/flatpak/run-bitcoin-safe.sh /app/bin/run-bitcoin-safe.sh
        install -Dm644 tools/resources/icon.svg /app/share/icons/hicolor/scalable/apps/org.bitcoin_safe.BitcoinSafe.svg
        install -Dm644 tools/resources/icon-128.png /app/share/icons/hicolor/128x128/apps/org.bitcoin_safe.BitcoinSafe.png
        install -Dm644 tools/build-linux/flatpak/org.bitcoin_safe.BitcoinSafe.metainfo.xml /app/share/metainfo/org.bitcoin_safe.BitcoinSafe.metainfo.xml
        sed \
            -e 's#^Exec=.*#Exec=run-bitcoin-safe.sh %F#' \
            -e 's#^Icon=.*#Icon=org.bitcoin_safe.BitcoinSafe#' \
            tools/resources/linux-bitcoin-safe.desktop \
            > org.bitcoin_safe.BitcoinSafe.desktop
        install -Dm644 org.bitcoin_safe.BitcoinSafe.desktop /app/share/applications/org.bitcoin_safe.BitcoinSafe.desktop
        mkdir -p /app/app
        ln -sfn ../share /app/app/share
        rm -rf "${BUILD_VENV_ROOT}" dist org.bitcoin_safe.BitcoinSafe.desktop
    sources:
      - type: dir
        path: build/source-tree
