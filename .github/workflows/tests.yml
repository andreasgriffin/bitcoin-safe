name: Python Tests Matrix
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deterministic-build-compile-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry==2.4.1

      - name: Rebuild deterministic build requirements
        run: bash tools/deterministic-build/compile.sh

      - name: Fail if deterministic build files changed
        run: |
          set -euo pipefail
          if [ -n "$(git status --short)" ]; then
            echo "Running tools/deterministic-build/compile.sh produced changes:"
            git status --short
            git --no-pager diff
            exit 1
          fi

  linux-tests:
    strategy:
      matrix:
        backend: [fulcrum, cbf]
    uses: ./.github/workflows/python-tests.yml
    secrets: inherit
    with:
      os: ubuntu-22.04
      backend: ${{ matrix.backend }}

  windows-tests:
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pytest-win') }}
    strategy:
      matrix:
        backend: [cbf]
    uses: ./.github/workflows/python-tests.yml
    secrets: inherit
    with:
      os: windows-latest
      backend: ${{ matrix.backend }}

  macos-tests:
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pytest-mac') }}
    strategy:
      matrix:
        backend: [cbf]
    uses: ./.github/workflows/python-tests.yml
    secrets: inherit
    with:
      os: macos-latest
      backend: ${{ matrix.backend }}
