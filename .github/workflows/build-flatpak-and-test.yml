name: Build Flatpak and test
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      commitHash:
        description: "Enter the commit hash to build (leave empty to use the default branch or the branch that triggered the workflow)"
        required: false
        type: string
      artifact_name_prefix:
        description: "Optional prefix for uploaded artifact names"
        required: false
        default: ""
        type: string
      run_tests:
        description: "Run the Flatpak smoke test after the build"
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      commitHash:
        required: false
        type: string
        default: ""
      artifact_name_prefix:
        required: false
        type: string
        default: ""
      run_tests:
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch and checkout custom commit
        if: ${{ inputs.commitHash != '' }}
        run: |
          git fetch origin ${{ inputs.commitHash }}
          git checkout ${{ inputs.commitHash }}

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xinput0 \
            libxcb-xfixes0 \
            libxcb-shape0 \
            libglib2.0-0 \
            libegl1 \
            libgl1 \
            libglu1-mesa \
            libxrender1 \
            libxi6 \
            libxkbcommon0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Build Flatpak bundle in Docker
        run: poetry run python tools/build.py --targets flatpak --commit None

      - name: Check for Flatpak bundle
        run: |
          if [ -z "$(find dist -type f -name '*.flatpak')" ]; then
            echo "Flatpak bundle is missing"
            exit 1
          fi

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name_prefix }}flatpak-artifacts
          path: |
            dist/*.flatpak
            tools/build_linux/flathub_flatpak/build/repro-debug/**
          if-no-files-found: error

  test:
    if: ${{ inputs.run_tests }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      DISPLAY: ":99"
      QT_QPA_PLATFORM: xcb
      XDG_RUNTIME_DIR: /tmp/runtime-bitcoin-safe
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch and checkout custom commit
        if: ${{ inputs.commitHash != '' }}
        run: |
          git fetch origin ${{ inputs.commitHash }}
          git checkout ${{ inputs.commitHash }}

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name_prefix }}flatpak-artifacts
          path: artifacts

      - name: Install Linux test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick \
            xvfb \
            dbus-x11 \
            x11-apps \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xinput0 \
            libxcb-xfixes0 \
            libxcb-shape0 \
            libglib2.0-0 \
            libegl1 \
            libgl1 \
            libglu1-mesa \
            libxrender1 \
            libxi6 \
            libxkbcommon0
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

      - name: Start Xvfb
        run: |
          Xvfb "$DISPLAY" -screen 0 1280x720x24 &
          echo $! > xvfb.pid
          sleep 3

      - name: Prepare user namespaces for Flatpak smoke test
        run: |
          if sysctl kernel.apparmor_restrict_unprivileged_userns >/dev/null 2>&1; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if sysctl kernel.unprivileged_userns_clone >/dev/null 2>&1; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi

      - name: Smoke-test Flatpak bundle
        run: |
          BUNDLE_PATH=$(find artifacts -type f -name '*.flatpak' | head -n 1)
          if [ -z "$BUNDLE_PATH" ]; then
            echo "No Flatpak bundle found for smoke test"
            exit 1
          fi
          bash tools/build_linux/flathub_flatpak/install_and_smoke_test_bundle.sh "$BUNDLE_PATH" org.bitcoin_safe.BitcoinSafe

      - name: Upload Flatpak startup logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-startup-logs
          path: |
            artifacts/repro-debug/**
            tools/build_linux/flathub_flatpak/build/flatpak-run.log
            tools/build_linux/flathub_flatpak/build/flatpak-screenshot-*.xwd
            tools/build_linux/flathub_flatpak/build/flatpak-screenshot-*.png
            ${{ env.HOME }}/.var/app/org.bitcoin_safe.BitcoinSafe/config/bitcoin_safe/bitcoin_safe.log
          if-no-files-found: ignore
