name: Check Flatpak reproducibility
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      commitHash:
        description: "Enter the commit hash to build (leave empty to use the current branch HEAD)"
        required: false
        type: string

jobs:
  reproducibility:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch and checkout custom commit
        if: ${{ inputs.commitHash != '' }}
        run: |
          git fetch origin ${{ inputs.commitHash }}
          git checkout ${{ inputs.commitHash }}

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run Flatpak reproducibility check
        run: |
          bash tools/build-linux/flatpak/check_reproducibility.sh

      - name: Upload Flatpak reproducibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repro-check
          path: tools/build-linux/flatpak/build/repro-check/**
          if-no-files-found: warn
